<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Note window screenshot placeholder</title>
  <desc id="desc">Placeholder image for a future TinyTracker note window screenshot.</desc>
  <rect width="1200" height="700" fill="#f4f1e8"/>
  <rect x="70" y="70" width="1060" height="560" rx="22" fill="#ffffff" stroke="#c8ced7" stroke-width="4"/>
  <rect x="70" y="70" width="1060" height="74" rx="22" fill="#d7e6f7"/>
  <circle cx="110" cy="107" r="10" fill="#7d8a9a"/>
  <circle cx="140" cy="107" r="10" fill="#7d8a9a"/>
  <circle cx="170" cy="107" r="10" fill="#7d8a9a"/>
  <text x="600" y="110" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#1f2933">Replace with current note window screenshot</text>
  <rect x="145" y="190" width="910" height="310" rx="14" fill="#fff9bf" stroke="#d8cc64" stroke-width="3"/>
  <text x="600" y="335" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="44" fill="#4a5568">TinyTracker Note</text>
  <text x="600" y="395" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#4a5568">Use this placeholder until a fresh capture is available.</text>
</svg>
